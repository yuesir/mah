@if (!editorVisible) {
	<app-home
		[hidden]="loading || gameVisible"
		(startEvent)="startHomeGame($event)"
		(openSettingsEvent)="openHomeSettings()"
	/>
	<app-game-component #gameComponent [hidden]="loading || !gameVisible" [class]="'theme-'+app.settings.theme" (goHomeEvent)="goHome()"/>
}
<ng-template #editorPlaceholder/>
