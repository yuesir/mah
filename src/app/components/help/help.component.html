<div class="help-wrap">
	<fieldset class="help">
		<legend>{{ 'HOW_TO_PLAY' | translate }}</legend>
		<p class="goal">{{ 'HOW_GOAL' | translate }}</p>
		<div class="rule">
			<span class="rule-label">{{ 'HOW_OPEN' | translate }}</span>
			<span class="rule-desc">{{ 'HOW_OPEN_DESC' | translate }}</span>
		</div>
		<div class="rule">
			<span class="rule-label">{{ 'HOW_PAIR' | translate }}</span>
			<span class="rule-desc">{{ 'HOW_PAIR_DESC' | translate }}</span>
		</div>
		<p class="do">{{ 'HOW_DO' | translate }}</p>
		<div class="actions">
			<button type="button" class="action-btn" (click)="showTutorial.emit()">{{ 'TUTORIAL_SHOW' | translate }}</button>
			<a class="action-btn" (click)="clickExternalHref($event)" rel="noopener" target="_blank" href="{{ 'READ_MORE_WIKIPEDIA_URL' | translate }}">{{ 'READ_MORE_WIKIPEDIA' | translate }}</a>
		</div>
	</fieldset>
</div>
